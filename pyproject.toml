[tool.black]
line-length = 100
target-version = ["py311"]
extend-exclude = '''
(
  ^/data/
  | ^/logs/
  | ^/venv/
  | ^/\.venv/
  | ^/\.git/
)
'''

[tool.ruff]
line-length = 100
target-version = "py311"
exclude = [
  ".git",
  ".mypy_cache",
  ".pytest_cache",
  ".ruff_cache",
  ".venv",
  "venv",
  "data",
  "logs",
]

[tool.ruff.lint]
select = [
  "E",
  "F",
  "I",
  "UP",
  "B",
  "ASYNC",
  "S",
]
ignore = [
  "E501",
  "S101",
]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["S101", "S105", "S106", "S107"]
"scripts/**/*.py" = ["S603", "S607"]

[tool.mypy]
python_version = "3.11"
warn_unused_configs = true
ignore_missing_imports = true
check_untyped_defs = true
no_implicit_optional = true
explicit_package_bases = true
exclude = [
  "data/",
  "logs/",
  "venv/",
  ".venv/",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
filterwarnings = [
  "ignore::DeprecationWarning",
]
