<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" role="img" aria-labelledby="title desc">
  <title id="title">苍鸮量化 Logo</title>
  <desc id="desc">由几何线条和发光眼睛构成的猫头鹰量化标志</desc>
  <defs>
    <linearGradient id="owl-bg" x1="16" y1="10" x2="84" y2="88" gradientUnits="userSpaceOnUse">
      <stop stop-color="#071426"/>
      <stop offset="0.55" stop-color="#0B2B46"/>
      <stop offset="1" stop-color="#04261F"/>
    </linearGradient>
    <linearGradient id="owl-line" x1="20" y1="20" x2="76" y2="78" gradientUnits="userSpaceOnUse">
      <stop stop-color="#34D6FF"/>
      <stop offset="1" stop-color="#6CFFB8"/>
    </linearGradient>
    <filter id="soft-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="96" height="96" rx="24" fill="url(#owl-bg)"/>
  <path d="M18 33 30 17l18 11 18-11 12 16-9 35-21 12-21-12-9-35Z" fill="none" stroke="url(#owl-line)" stroke-width="4" stroke-linejoin="round"/>
  <path d="M30 28h36M26 38l22 9 22-9M32 63l16 11 16-11" fill="none" stroke="#2C6F93" stroke-width="2" stroke-linecap="round"/>
  <g filter="url(#soft-glow)">
    <circle cx="36" cy="46" r="10" fill="#0D1E33" stroke="#34D6FF" stroke-width="3"/>
    <circle cx="60" cy="46" r="10" fill="#0D1E33" stroke="#6CFFB8" stroke-width="3"/>
    <circle cx="36" cy="46" r="3.8" fill="#34D6FF"/>
    <circle cx="60" cy="46" r="3.8" fill="#6CFFB8"/>
  </g>
  <path d="M48 49 42 59h12l-6-10Z" fill="#B9FFE2"/>
  <path d="M20 76h56" stroke="#163C55" stroke-width="2" stroke-linecap="round" stroke-dasharray="3 7"/>
</svg>
